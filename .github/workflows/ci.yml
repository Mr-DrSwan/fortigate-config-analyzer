name: CI

on:
  push:
    branches: ["dev", "main", "master"]
  pull_request:
    branches: ["dev", "main", "master"]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov bandit pip-audit ruff

      - name: Lint with ruff
        run: |
          ruff check . --select E,F,W --ignore E501,W291,W293 --exclude build,dist,local_build

      - name: Run tests with coverage
        run: |
          pytest -q --cov=. --cov-config=.coveragerc --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Run security static checks
        run: |
          bandit -q -r app.py fortigate_analyzer.py install.py --severity-level medium
          pip-audit
