name: CD Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y
      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --icon assets/forti-analyzer-icon.ico --name FortiGateAnalyzer app.py
      - name: Build installer
        run: |
          iscc installer\FortiGateAnalyzer.iss
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortiGateAnalyzer-windows-release
          path: |
            dist/FortiGateAnalyzer.exe
            dist/FortiGateAnalyzer-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build app bundle
        run: |
          pyinstaller --noconfirm --windowed --icon assets/forti-analyzer-icon.icns --name FortiGateAnalyzer app.py
          productbuild --component dist/FortiGateAnalyzer.app /Applications dist/FortiGateAnalyzer-macOS.pkg
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortiGateAnalyzer-macOS-release
          path: dist/FortiGateAnalyzer-macOS.pkg

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FortiGateAnalyzer-windows-release
          path: release_assets
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: FortiGateAnalyzer-macOS-release
          path: release_assets
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/FortiGateAnalyzer.exe
            release_assets/FortiGateAnalyzer-Setup.exe
            release_assets/FortiGateAnalyzer-macOS.pkg
