name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches: ["dev", "main", "master"]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app bundle
        run: |
          pyinstaller --noconfirm --windowed --icon assets/forti-analyzer-icon.icns --name FortiGateAnalyzer app.py

      - name: Create zip archive
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/FortiGateAnalyzer.app dist/FortiGateAnalyzer-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortiGateAnalyzer-macOS
          path: dist/FortiGateAnalyzer-macOS.zip
